<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages - Customer</title>
<link rel="stylesheet" href="messages.css">
</head>
<body>
 
<div class="app">
 
    <!-- HEADER -->
    <div class="top-bar">
        <button class="back-btn" onclick="goBack()">&#8592; Back</button>
        <h2>Messages</h2>
        <span id="customer-label"></span>
    </div>
 
    <div class="main">
 
        <!-- SIDEBAR: store list -->
        <div class="sidebar">
            <div class="sidebar-header">Stores</div>
            <div id="contact-list"><div class="empty-sidebar">Loading stores...</div></div>
        </div>
 
        <!-- CHAT AREA -->
        <div class="chat-area" id="chat-area">
            <div class="no-chat">Select a store to message</div>
        </div>
 
    </div>
</div>
 
<script type="module">
 
import {
    getAllStores,
    getMessages,
    sendMessage,
    getThreadsForCustomer
} from "./db.js";
 
const currentCustomer = localStorage.getItem("currentCustomer");
if (!currentCustomer) {
    alert("Please login first.");
    window.location.href = "login.html";
}
 
document.getElementById("customer-label").innerText = currentCustomer;
 
let activeStore = null;       // { seller, name, photo }
let allStores   = [];
let threadMap   = {};         // sellerUsername -> last message & unread count
 
// ── Boot ──────────────────────────────────────────────────────────────────────
async function init() {
    allStores  = await getAllStores();
    await refreshThreads();
    renderSidebar();
}
 
async function refreshThreads() {
    const threads = await getThreadsForCustomer(currentCustomer);
    threadMap = {};
    threads.forEach(t => {
        const msgs = t.messages.sort((a, b) => (a.sentAt?.seconds || 0) - (b.sentAt?.seconds || 0));
        const last = msgs[msgs.length - 1];
        const unread = msgs.filter(m => m.sender === "seller").length; // simple badge (no true read-state yet)
        threadMap[t.sellerUsername] = { last, unread };
    });
}
 
// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
    const list = document.getElementById("contact-list");
    list.innerHTML = "";
 
    if (allStores.length === 0) {
        list.innerHTML = "<div class='empty-sidebar'>No stores available</div>";
        return;
    }
 
    allStores.forEach(store => {
        const info   = threadMap[store.seller] || {};
        const last   = info.last;
        const unread = info.unread || 0;
 
        const div = document.createElement("div");
        div.className = "contact" + (activeStore?.seller === store.seller ? " active" : "");
        div.innerHTML = `
            <div class="avatar av-seller" style="overflow:hidden;padding:0">
                ${store.photo
                    ? `<img src="${store.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
                    : store.name.substring(0,2).toUpperCase()}
            </div>
            <div class="contact-info">
                <div class="contact-name">${store.name}</div>
                <div class="contact-preview">${last ? last.text.substring(0,30) : "Start a conversation"}</div>
            </div>
            ${unread ? `<span class="unread">${unread}</span>` : ""}
        `;
        div.onclick = () => openChat(store);
        list.appendChild(div);
    });
}
 
// ── Open chat ─────────────────────────────────────────────────────────────────
async function openChat(store) {
    activeStore = store;
    renderSidebar();
 
    const chatArea = document.getElementById("chat-area");
    chatArea.innerHTML = `
        <div class="chat-header">
            <div class="avatar av-seller" style="width:28px;height:28px;overflow:hidden;padding:0">
                ${store.photo
                    ? `<img src="${store.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
                    : store.name.substring(0,2).toUpperCase()}
            </div>
            <div>
                <div class="chat-header-name">${store.name}</div>
                <div class="chat-header-status">Store</div>
            </div>
        </div>
        <div class="messages" id="msg-list"><div style="text-align:center;padding:20px;opacity:.5">Loading…</div></div>
        <div class="input-area">
            <textarea class="msg-input" id="msg-input" placeholder="Type a message..." onkeydown="handleKeyProxy(event)"></textarea>
            <button class="send-btn" id="send-btn">Send</button>
        </div>
    `;
 
    document.getElementById("send-btn").onclick = sendMsg;
    await renderMessages();
}
 
// ── Render messages ───────────────────────────────────────────────────────────
async function renderMessages() {
    const list = document.getElementById("msg-list");
    if (!list || !activeStore) return;
 
    const msgs = await getMessages(currentCustomer, activeStore.seller);
    list.innerHTML = "";
 
    if (msgs.length === 0) {
        list.innerHTML = "<div style='text-align:center;padding:20px;opacity:.5'>No messages yet. Say hello! 👋</div>";
        return;
    }
 
    msgs.forEach(m => {
        const isSent = m.sender === "customer";
        const div = document.createElement("div");
        div.className = "msg " + (isSent ? "sent" : "received");
        const time = m.sentAt?.seconds
            ? formatTime(new Date(m.sentAt.seconds * 1000))
            : "";
        div.innerHTML = `<div>${m.text}</div><div class="msg-time">${time}</div>`;
        list.appendChild(div);
    });
    list.scrollTop = list.scrollHeight;
}
 
// ── Send message ──────────────────────────────────────────────────────────────
async function sendMsg() {
    const input = document.getElementById("msg-input");
    if (!input || !input.value.trim() || !activeStore) return;
    const text = input.value.trim();
    input.value = "";
    input.disabled = true;
 
    await sendMessage(currentCustomer, activeStore.seller, "customer", text);
 
    input.disabled = false;
    input.focus();
    await refreshThreads();
    renderSidebar();
    await renderMessages();
}
 
// ── Keyboard shortcut ─────────────────────────────────────────────────────────
window.handleKeyProxy = function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMsg();
    }
};
 
// ── Helpers ───────────────────────────────────────────────────────────────────
function formatTime(date) {
    let h = date.getHours(), m = date.getMinutes(), ap = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    return h + ":" + (m < 10 ? "0" + m : m) + " " + ap;
}
 
window.goBack = function() {
    window.location.href = "foruzer.html";
};
 
// ── Auto-refresh every 5 seconds ──────────────────────────────────────────────
setInterval(async () => {
    await refreshThreads();
    renderSidebar();
    if (activeStore) await renderMessages();
}, 5000);
 
// ── Start ─────────────────────────────────────────────────────────────────────
init();
 
</script>
</body>
</html>
