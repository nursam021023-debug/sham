<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard</title>
<link rel="stylesheet" href="seller dashboard.css">
<style>
    /* ── OVERRIDE: price-grid and edit inputs need full width ── */
    .price-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:10px 0; }
    .price-grid label { font-size:11px; font-weight:700; color:#ccc; display:block; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.4px; }
    .price-grid input { width:100% !important; padding:8px 10px; margin:0; box-sizing:border-box; }
    .edit-fields input { width:100% !important; margin:0; box-sizing:border-box; }
    .edit-fields { display:flex; flex-direction:column; gap:6px; margin:8px 0; }

    /* ── AVAILABILITY BADGES ── */
    .availability-badge { display:inline-block; font-size:11px; padding:3px 10px; border-radius:99px; font-weight:700; margin:4px 0; }
    .avail   { background:#d4edda; color:#155724; }
    .unavail { background:#e2e3e5; color:#383d41; }
    .product-card.unavailable { opacity:0.55; }

    /* ── SIZE PRICES VIEW ── */
    .size-prices { font-size:12px; color:#ccc; margin:4px 0 8px; display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
    .size-prices span { background:rgba(255,255,255,0.1); border-radius:6px; padding:2px 8px; }

    /* ── CARD ACTION BUTTONS ── */
    .card-btn-row { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
    .btn-toggle { background:linear-gradient(135deg,#555,#888) !important; font-size:12px; padding:6px 12px !important; }
    .btn-edit   { background:linear-gradient(135deg,#1565c0,#1e88e5) !important; font-size:12px; padding:6px 12px !important; }
    .btn-delete { background:linear-gradient(135deg,#7b0000,#e53935) !important; font-size:12px; padding:6px 12px !important; }
    .btn-save   { background:linear-gradient(135deg,#1b5e20,#43a047) !important; font-size:12px; padding:6px 14px !important; }
    .btn-cancel { background:rgba(255,255,255,0.15) !important; color:#fff !important; font-size:12px; padding:6px 14px !important; }

    /* ── LOADING OVERLAY ── */
    #loadingOverlay {
        display:none; position:fixed; inset:0;
        background:rgba(0,0,0,0.65); z-index:999;
        justify-content:center; align-items:center;
        flex-direction:column; gap:14px;
        color:#fff; font-size:1rem; font-family:'Segoe UI',sans-serif;
    }
    #loadingOverlay.show { display:flex; }
    .spinner {
        width:40px; height:40px;
        border:4px solid rgba(255,255,255,0.2);
        border-top-color:#fff; border-radius:50%;
        animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── PRODUCT IMAGE ── */
    .product-card img { width:100%; max-height:130px; object-fit:cover; border-radius:10px; margin-bottom:8px; }

    /* ── FORM FILE LABEL ── */
    .file-label {
        display:block; margin:8px auto; width:90%;
        padding:10px; background:rgba(255,255,255,0.08);
        border:1.5px dashed rgba(255,255,255,0.3);
        border-radius:10px; cursor:pointer; font-size:0.85rem;
        color:#ccc; text-align:center; transition:border-color 0.2s;
    }
    .file-label:hover { border-color:#fff; color:#fff; }
    #previewImg { display:none; width:90%; max-height:160px; object-fit:cover; border-radius:10px; margin:8px auto; }
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay">
    <div class="spinner"></div>
    <span id="loadingMsg">Please wait...</span>
</div>

<h2>Seller Dashboard</h2>
<p id="welcome"></p>

<div class="container">
    <!-- ADD PRODUCT FORM -->
    <div class="form-box">
        <h3>Add Product</h3>

        <input type="text" id="productName" placeholder="Product Name">

        <label style="font-size:11px;font-weight:700;color:#ccc;text-transform:uppercase;letter-spacing:0.4px;display:block;margin:10px 0 4px;">Price (₱)</label>
        <input type="number" id="priceAmount" placeholder="e.g. 150" min="0" step="0.01" style="width:100%!important;box-sizing:border-box;margin-bottom:8px;">

        <label class="file-label" for="productImage">
            📷 Tap to choose product image
            <input type="file" id="productImage" accept="image/*" style="display:none;" onchange="previewProduct(this)">
        </label>
        <img id="previewImg" alt="Preview">

        <button class="add-btn" onclick="addProduct()">+ Add Product</button>
    </div>

    <h3>Your Products</h3>
    <div id="productList"></div>

    <div class="actions">
        <button class="back-btn" onclick="window.location.href='homeseller.html'">Back</button>
    </div>
</div>

<script type="module">
import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, doc, updateDoc, deleteDoc }
                             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
// No Firebase Storage needed — images stored as compressed base64 in Firestore

const firebaseConfig = {
    apiKey:            "AIzaSyBaDezXv4aynvYTJaaZyXwIRIImLBEYwB0",
    authDomain:        "dalocal-8ceb3.firebaseapp.com",
    projectId:         "dalocal-8ceb3",
    storageBucket:     "dalocal-8ceb3.appspot.com",
    messagingSenderId: "737186112999",
    appId:             "1:737186112999:web:f61d20523f4ac479f8c942"
};

const app     = initializeApp(firebaseConfig);
const db      = getFirestore(app);


// ── AUTH CHECK ───────────────────────────────────────────
const currentSeller = localStorage.getItem("currentSeller");
if (!currentSeller) {
    alert("Please login first.");
    window.location.href = "seller login.html";
    throw new Error("stop");
}
document.getElementById("welcome").innerText = "Welcome, " + currentSeller + "!";

// ── LOADING HELPERS ──────────────────────────────────────
function showLoading(msg) {
    document.getElementById("loadingMsg").textContent = msg || "Please wait...";
    document.getElementById("loadingOverlay").classList.add("show");
}
function hideLoading() {
    document.getElementById("loadingOverlay").classList.remove("show");
}

// ── COMPRESS IMAGE → BASE64 ──────────────────────────────
// Resizes to max 400px and targets ~150KB base64 — safe for Firestore 1MB doc limit
function compressToBase64(file, maxPx = 400, targetKB = 150) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Image load failed")); };
        img.onload = () => {
            URL.revokeObjectURL(url);
            const canvas = document.createElement("canvas");
            let w = img.width, h = img.height;
            if (w > maxPx || h > maxPx) {
                if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
                else       { w = Math.round(w * maxPx / h); h = maxPx; }
            }
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            let quality = 0.75;
            let dataUrl = canvas.toDataURL("image/jpeg", quality);
            while (dataUrl.length > targetKB * 1024 * 1.37 && quality > 0.1) {
                quality -= 0.08;
                dataUrl = canvas.toDataURL("image/jpeg", quality);
            }
            resolve(dataUrl);
        };
        img.src = url;
    });
}

// ── PREVIEW IMAGE ────────────────────────────────────────
window.previewProduct = function(input) {
    const file = input.files[0];
    if (!file) return;
    // Use object URL for fast preview — no FileReader needed
    const prev = document.getElementById("previewImg");
    prev.src = URL.createObjectURL(file);
    prev.style.display = "block";
};

// ── PRODUCTS STATE ───────────────────────────────────────
let products = [];

async function loadProducts() {
    showLoading("Loading products...");
    try {
        const q    = query(collection(db, "products"), where("seller", "==", currentSeller));
        const snap = await getDocs(q);
        products   = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        displayProducts();
    } catch (err) {
        alert("Failed to load products: " + err.message);
    } finally {
        hideLoading();
    }
}

function displayProducts() {
    const list = document.getElementById("productList");
    list.innerHTML = "";

    if (products.length === 0) {
        list.innerHTML = "<p style='color:#ccc;'>No products yet. Add your first one above!</p>";
        return;
    }

    products.forEach((p, index) => {
        const isAvailable = p.available !== false;
        const prices = null; // single price only

        const card = document.createElement("div");
        card.className = "product-card" + (isAvailable ? "" : " unavailable");
        card.id = "card-" + index;
        card.innerHTML = `
            <img src="${p.image}" alt="${p.name}" onerror="this.style.display='none'">

            <!-- VIEW MODE -->
            <div id="view-${index}">
                <h4>${p.name}</h4>
                <p style="font-size:0.9rem;color:#ccc;margin:4px 0 8px;text-align:center;">₱${p.price}</p>
            </div>

            <!-- EDIT MODE -->
            <div id="edit-${index}" style="display:none;">
                <div class="edit-fields">
                    <input type="text" id="editName-${index}" value="${p.name}" placeholder="Product Name">
                    <label style="font-size:11px;font-weight:700;color:#ccc;text-transform:uppercase;display:block;margin:6px 0 4px;">Price (₱)</label>
                    <input type="number" id="editPrice-${index}" value="${p.price}" min="0" step="0.01" style="width:100%!important;box-sizing:border-box;">
                </div>
                <div class="card-btn-row">
                    <button class="btn-save"   onclick="saveEdit(${index})">Save</button>
                    <button class="btn-cancel" onclick="cancelEdit(${index})">Cancel</button>
                </div>
            </div>

            <span class="availability-badge ${isAvailable ? 'avail' : 'unavail'}">
                ${isAvailable ? 'Available' : 'Not Available'}
            </span>

            <div class="card-btn-row">
                <button class="btn-toggle" onclick="toggleAvailability(${index})">
                    ${isAvailable ? 'Mark Unavailable' : 'Mark Available'}
                </button>
                <button class="btn-edit"   id="editBtn-${index}" onclick="editProduct(${index})">Edit</button>
                <button class="btn-delete" onclick="deleteProduct(${index})">Delete</button>
            </div>
        `;
        list.appendChild(card);
    });
}

// ── ADD PRODUCT ──────────────────────────────────────────
window.addProduct = async function() {
    const name      = document.getElementById("productName").value.trim();
    const amount    = document.getElementById("priceAmount").value.trim();
    const imageFile = document.getElementById("productImage").files[0];

    // Validation
    if (!name)   { alert("Please enter a product name."); return; }
    if (!amount || isNaN(amount) || Number(amount) <= 0) { alert("Please enter a valid price greater than 0."); return; }
    if (!imageFile) { alert("Please choose a product image."); return; }

    showLoading("Compressing image...");
    try {
        // Step 1: Compress image to small base64 (no Firebase Storage needed)
        const imageBase64 = await compressToBase64(imageFile);
        if (!imageBase64) throw new Error("Image compression failed.");

        // Step 2: Save product to Firestore with base64 image inline
        showLoading("Saving product...");
        await addDoc(collection(db, "products"), {
            seller:    currentSeller,
            name:      name,
            price:     Number(amount).toFixed(2),
            image:     imageBase64,
            available: true
        });

        // Step 4: Clear form
        document.getElementById("productName").value  = "";
        document.getElementById("priceAmount").value  = "";
        document.getElementById("productImage").value = "";
        const prev = document.getElementById("previewImg");
        prev.src = ""; prev.style.display = "none";

        hideLoading();
        alert("Product added successfully!");
        await loadProducts();

    } catch (err) {
        hideLoading();
        if (err.code === "storage/unauthorized") {
            alert("Upload failed: Storage permission denied.\nPlease check Firebase Storage rules in your Firebase Console.");
        } else {
            alert("Failed to add product: " + err.message);
        }
    }
};

// ── EDIT / SAVE / CANCEL ─────────────────────────────────
window.editProduct = function(index) {
    document.getElementById("view-"    + index).style.display    = "none";
    document.getElementById("edit-"    + index).style.display    = "block";
    document.getElementById("editBtn-" + index).style.display    = "none";
};

window.cancelEdit = function(index) {
    document.getElementById("view-"    + index).style.display    = "block";
    document.getElementById("edit-"    + index).style.display    = "none";
    document.getElementById("editBtn-" + index).style.display    = "inline-block";
};

window.saveEdit = async function(index) {
    const newName   = document.getElementById("editName-"   + index).value.trim();
    const newPrice  = document.getElementById("editPrice-"  + index).value.trim();
    if (!newName)  { alert("Product name cannot be empty."); return; }
    if (!newPrice || isNaN(newPrice) || Number(newPrice) <= 0) { alert("Please enter a valid price."); return; }

    showLoading("Saving changes...");
    try {
        await updateDoc(doc(db, "products", products[index].id), {
            name:  newName,
            price: Number(newPrice).toFixed(2)
        });
        await loadProducts();
    } catch (err) {
        hideLoading();
        alert("Failed to save: " + err.message);
    }
};

// ── TOGGLE AVAILABILITY ──────────────────────────────────
window.toggleAvailability = async function(index) {
    const p = products[index];
    showLoading("Updating...");
    try {
        await updateDoc(doc(db, "products", p.id), { available: p.available === false });
        await loadProducts();
    } catch (err) {
        hideLoading();
        alert("Failed to update: " + err.message);
    }
};

// ── DELETE ───────────────────────────────────────────────
window.deleteProduct = async function(index) {
    if (!confirm('Delete "' + products[index].name + '"? This cannot be undone.')) return;
    showLoading("Deleting...");
    try {
        await deleteDoc(doc(db, "products", products[index].id));
        await loadProducts();
    } catch (err) {
        hideLoading();
        alert("Failed to delete: " + err.message);
    }
};

// ── INIT ─────────────────────────────────────────────────
loadProducts();
</script>
</body>
</html>
