<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Register</title>
    <link rel="stylesheet" href="login.css">
    <style>
        input[type="email"] { width:100%;padding:10px;margin:8px 0;border-radius:12px;border:1px solid rgba(255,255,255,0.2);outline:none;background:rgba(255,255,255,0.05);color:#fff;font-size:0.95rem;transition:all 0.3s ease;font-family:'Poppins',sans-serif; }
        input[type="email"]::placeholder{color:#bbb;opacity:0.7;}
        input[type="email"]:focus{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,0.4);background:rgba(255,255,255,0.1);}
        .login-box{width:320px;border-radius:20px;padding:35px 30px;background:rgba(255,255,255,0.05);backdrop-filter:blur(15px);box-shadow:0 20px 50px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);text-align:center;position:relative;}
        #loadingOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;justify-content:center;align-items:center;color:#fff;font-size:1.1rem;font-family:'Poppins',sans-serif;}
        #loadingOverlay.show{display:flex;}
        .spinner{width:36px;height:36px;border:4px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:14px;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>
<div id="loadingOverlay"><div class="spinner"></div><span id="loadingMsg">Creating your account...</span></div>
<div class="login-box">
    <button class="back-btn" onclick="goBack()">✕</button>
    <h2>Create Account</h2>
    <input type="text" id="newUser" placeholder="Username">
    <input type="email" id="newEmail" placeholder="Email">
    <input type="password" id="newPass" placeholder="Password (min 6 chars)">
    <label class="file-label" for="profilePic">Profile Picture</label>
    <input type="file" id="profilePic" accept="image/*">
    <img id="preview" src="" alt="Preview">
    <button onclick="register()">Sign Up</button>
    <div class="separator"></div>
    <p>Already have an account? <a href="login.html">Login here</a></p>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyBaDezXv4aynvYTJaaZyXwIRIImLBEYwB0",authDomain:"dalocal-8ceb3.firebaseapp.com",projectId:"dalocal-8ceb3",storageBucket:"dalocal-8ceb3.appspot.com",messagingSenderId:"737186112999",appId:"1:737186112999:web:f61d20523f4ac479f8c942" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("profilePic").addEventListener("change", function () {
    const file = this.files[0];
    if (file) { const r=new FileReader(); r.onload=e=>{const p=document.getElementById("preview");p.src=e.target.result;p.style.display="block";}; r.readAsDataURL(file); }
});

function compressImage(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onload = e => {
            const img = new Image();
            img.onerror = reject;
            img.onload = () => {
                const canvas = document.createElement("canvas");
                let w=img.width, h=img.height, maxDim=400;
                if(w>maxDim||h>maxDim){if(w>h){h=Math.round(h*maxDim/w);w=maxDim;}else{w=Math.round(w*maxDim/h);h=maxDim;}}
                canvas.width=w; canvas.height=h;
                canvas.getContext("2d").drawImage(img,0,0,w,h);
                let quality=0.75, dataUrl=canvas.toDataURL("image/jpeg",quality);
                while(dataUrl.length>200*1024*1.37&&quality>0.15){quality-=0.1;dataUrl=canvas.toDataURL("image/jpeg",quality);}
                resolve(dataUrl);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

window.register = async function () {
    const username=document.getElementById("newUser").value.trim();
    const email=document.getElementById("newEmail").value.trim();
    const password=document.getElementById("newPass").value.trim();
    const imageFile=document.getElementById("profilePic").files[0];
    if(!username||!email||!password){alert("Please fill in all fields.");return;}
    if(password.length<6){alert("Password must be at least 6 characters.");return;}
    if(!imageFile){alert("Please upload a profile picture.");return;}
    const overlay=document.getElementById("loadingOverlay");
    const msg=document.getElementById("loadingMsg");
    overlay.classList.add("show"); msg.textContent="Compressing image...";
    try {
        const profilePic=await compressImage(imageFile);
        msg.textContent="Creating your account...";
        const userCred=await createUserWithEmailAndPassword(auth,email,password);
        const uid=userCred.user.uid;
        await setDoc(doc(db,"customers",uid),{uid,username,email,profilePic,createdAt:new Date().toISOString(),role:"customer"});
        localStorage.setItem("currentCustomer",username);
        localStorage.setItem("currentCustomerUID",uid);
        // Customer saved to Firestore — no localStorage array needed
        overlay.classList.remove("show");
        alert("Registered successfully! Welcome, "+username+"!");
        window.location.href="login.html";
    } catch(err) {
        overlay.classList.remove("show");
        if(err.code==="auth/email-already-in-use")alert("This email is already registered.");
        else alert("Registration error: "+err.message);
    }
};
window.goBack=()=>{window.location.href="login.html";};
</script>
</body>
</html>
