<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reservations</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            color: #2d2d2d;
            min-height: 100vh;
            padding-bottom: 60px;
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            margin: 16px 20px 0;
            background: none; border: none;
            color: #5a7fc1; font-size: 14px; font-weight: 600;
            cursor: pointer; padding: 6px 10px; border-radius: 8px;
            transition: background .15s;
        }
        .back-btn:hover { background: #e8eef8; }
        .page-header { padding: 10px 24px 6px; }
        .page-title { font-size: 22px; font-weight: 700; color: #1a1a2e; }
        .page-sub { font-size: 13px; color: #777; margin-top: 2px; }
        .refresh-row {
            text-align: center; font-size: 11px; color: #bbb; padding: 8px 0 0;
        }
        .refresh-dot {
            display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; background: #4caf50; margin-right: 4px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
        }
        .order-list { padding: 14px 20px; display: flex; flex-direction: column; gap: 14px; }
        .empty {
            color: #aaa; text-align: center; padding: 60px 0; font-size: 15px;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .empty-icon { font-size: 40px; }
        .order-card {
            background: #fff; border-radius: 14px;
            border: 1px solid #e4e9f4;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
            overflow: hidden;
            animation: fadeUp .25s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .order-card.status-pending    { border-left: 4px solid #f5c842; }
        .order-card.status-reserved   { border-left: 4px solid #f39c12; }
        .order-card.status-to-ship    { border-left: 4px solid #17a2b8; }
        .order-card.status-to-receive { border-left: 4px solid #007bff; }
        .order-card.status-delivered  { border-left: 4px solid #28a745; }
        .order-card.status-cancelled  { border-left: 4px solid #e74c3c; opacity: 0.75; }
        .order-card-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px 8px; border-bottom: 1px solid #f0f2f8;
        }
        .order-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .reserve-type-badge {
            font-size: 11px; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
            background: #fff3e0; color: #b05e00;
        }
        .status-badge {
            font-size: 11px; font-weight: 700;
            padding: 3px 10px; border-radius: 20px;
        }
        .order-date { font-size: 11px; color: #aaa; white-space: nowrap; }
        .order-body { display: flex; gap: 12px; padding: 12px 16px 12px; }
        .order-img {
            width: 70px; height: 70px; object-fit: cover;
            border-radius: 10px; border: 1px solid #eee; flex-shrink: 0;
            background: #f4f4f4;
        }
        .order-info { flex: 1; min-width: 0; }
        .order-name { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
        .order-detail { font-size: 12px; color: #666; margin-top: 3px; }
        .order-price { color: #2a7d4f; font-weight: 700; }
        .order-seller {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 12px; color: #888; margin-top: 5px;
        }
        .status-notice {
            margin: 0 16px 14px; padding: 10px 14px;
            border-radius: 10px; font-size: 12px;
            display: flex; align-items: flex-start; gap: 8px;
        }
        .status-notice .sn-icon { font-size: 16px; flex-shrink: 0; }
        .status-notice strong { display: block; font-size: 13px; margin-bottom: 2px; }
        .notice-pending    { background: #fffbea; border: 1px solid #f5d478; color: #7d5a00; }
        .notice-reserved   { background: #fff3e0; border: 1px solid #f5c680; color: #7d3c00; }
        .notice-to-ship    { background: #e8f7fb; border: 1px solid #9eddea; color: #0c5460; }
        .notice-to-receive { background: #e8f0fe; border: 1px solid #9ecfff; color: #004085; }
        .notice-delivered  { background: #d0f0e8; border: 1px solid #7dd8bc; color: #0a5940; }
        .notice-cancelled  { background: #fff0f0; border: 1px solid #f5a0a0; color: #8b0000; }

        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: #1a1a2e; color: #fff; padding: 11px 24px;
            border-radius: 30px; font-size: 13px; font-weight: 600;
            box-shadow: 0 4px 16px rgba(0,0,0,.2);
            transition: transform .3s ease, opacity .3s ease;
            opacity: 0; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .loading-msg {
            text-align: center; color: #aaa; padding: 40px 0; font-size: 14px;
        }
    </style>
</head>
<body>

    <button class="back-btn" onclick="goBack()">&#8592; Back</button>

    <div class="page-header">
        <h1 class="page-title">📅 My Reservations</h1>
        <p class="page-sub" id="customerLabel">—</p>
    </div>

    <div class="refresh-row">
        <span class="refresh-dot"></span>Auto-refreshes every 10 seconds
    </div>

    <div class="order-list" id="orderList">
        <p class="loading-msg">Loading reservations...</p>
    </div>

    <div class="toast" id="toast"></div>

<script type="module">
    const currentCustomer = localStorage.getItem("currentCustomer");
    const currentUID      = localStorage.getItem("currentCustomerUID") || "";

    if (!currentCustomer) {
        alert("Please login as customer first.");
        window.location.href = "login.html";
    }

    document.getElementById("customerLabel").innerText = "Hello, " + currentCustomer + " 👋";

    let _reservations = [];

    async function loadReservations() {
        try {
            const { getOrdersByCustomer } = await import("./db.js");
            const all     = await getOrdersByCustomer(currentUID);
            _reservations = all.filter(o => o.type === "reservation" || o.reserveDate || o.date);
        } catch(e) {
            console.error("Failed to load reservations:", e);
            _reservations = [];
        }
        renderList();
    }

    function renderList() {
        const list = [..._reservations].sort((a, b) => {
            return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
        });

        const container = document.getElementById("orderList");
        container.innerHTML = "";

        if (list.length === 0) {
            container.innerHTML = `
                <div class="empty">
                    <div class="empty-icon">📅</div>
                    <div>No reservations yet.</div>
                </div>`;
            return;
        }

        list.forEach(reservation => {
            const status = reservation.status || "reserved";
            const info   = getStatusInfo(status);

            const rawDate = reservation.createdAt?.seconds
                ? new Date(reservation.createdAt.seconds * 1000)
                : reservation.createdAt ? new Date(reservation.createdAt) : null;
            const displayDate = rawDate
                ? rawDate.toLocaleDateString("en-PH", {
                    year: "numeric", month: "short", day: "numeric"
                  })
                : "—";

            const card = document.createElement("div");
            card.classList.add("order-card", "status-" + status);

            card.innerHTML = `
                <div class="order-card-top">
                    <div class="order-meta">
                        <span class="reserve-type-badge">📅 Reservation</span>
                        <span class="status-badge"
                              style="background:${info.bg}; color:${info.color};">
                            ${info.icon} ${info.label}
                        </span>
                    </div>
                    <span class="order-date">${displayDate}</span>
                </div>

                <div class="order-body">
                    <img class="order-img"
                         src="${reservation.image || ''}"
                         alt="${reservation.name || ''}"
                         onerror="this.style.display='none'">
                    <div class="order-info">
                        <h3 class="order-name">${reservation.name || 'Item'}</h3>
                        <p class="order-detail">
                            Size: <strong>${reservation.size || '—'}</strong>
                            &nbsp;|&nbsp;
                            Qty: <strong>${reservation.qty || 1}</strong>
                        </p>
                        <p class="order-detail">
                            Price: <strong class="order-price">
                                ₱${(parseFloat(reservation.price || 0) * (reservation.qty || 1)).toFixed(0)}
                            </strong>
                        </p>
                        ${reservation.reserveDate || reservation.date ? `
                        <p class="order-detail">
                            📅 Reserve Date:
                            <strong>${reservation.reserveDate || reservation.date}</strong>
                        </p>` : ''}
                        ${reservation.referenceNum ? `
                        <p class="order-detail">
                            Ref #: <strong>${reservation.referenceNum}</strong>
                        </p>` : ''}
                        <p class="order-seller">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                <polyline points="9 22 9 12 15 12 15 22"/>
                            </svg>
                            ${reservation.sellerUsername || reservation.seller || '—'}
                        </p>
                    </div>
                </div>

                <div class="status-notice notice-${status}">
                    <div class="sn-icon">${info.icon}</div>
                    <div style="flex:1;">
                        <strong>${info.noticeTitle}</strong>
                        ${info.noticeMsg}
                    </div>
                </div>
            `;

            container.appendChild(card);
        });
    }

    function getStatusInfo(status) {
        const map = {
            "pending": {
                label: "Pending", icon: "🕐",
                bg: "#fff3cd", color: "#856404",
                noticeTitle: "Waiting for Seller",
                noticeMsg: "Your reservation is being reviewed by the seller."
            },
            "reserved": {
                label: "Reserved", icon: "📅",
                bg: "#fde8d8", color: "#7d3c00",
                noticeTitle: "Reservation Confirmed!",
                noticeMsg: "Your reservation is confirmed. Please come on your reserved date."
            },
            "to-ship": {
                label: "To Ship", icon: "📦",
                bg: "#d1ecf1", color: "#0c5460",
                noticeTitle: "Being Prepared",
                noticeMsg: "The seller is preparing your order for shipment."
            },
            "to-receive": {
                label: "To Receive", icon: "🚚",
                bg: "#cce5ff", color: "#004085",
                noticeTitle: "On the Way!",
                noticeMsg: "Your order is on its way. Please wait for delivery."
            },
            "delivered": {
                label: "Delivered", icon: "✅",
                bg: "#d0f0e8", color: "#0a5940",
                noticeTitle: "Delivered!",
                noticeMsg: "Your order has been delivered. Thank you!"
            },
            "cancelled": {
                label: "Cancelled", icon: "🚫",
                bg: "#fde8e8", color: "#8b0000",
                noticeTitle: "Reservation Cancelled",
                noticeMsg: "This reservation has been cancelled."
            },
        };
        return map[status] || {
            label: status, icon: "❓",
            bg: "#e2e3e5", color: "#383d41",
            noticeTitle: "Unknown Status",
            noticeMsg: ""
        };
    }

    function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }

    window.goBack = function() { window.location.href = "customer-profile.html"; };

    await loadReservations();
    setInterval(loadReservations, 10000);
</script>
</body>
</html>
